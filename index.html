<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Liberado</title>
    
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
        }

        .status {
            color: #00ff00;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .bonus-box {
            border: 1px dashed #555;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .bonus-val {
            display: block;
            font-size: 32px;
            font-weight: 900;
            color: #ffcc00;
        }

        .cta-button {
            display: block;
            background-color: #00e676;
            color: #000;
            text-decoration: none;
            padding: 22px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status">● Conexão Segura Estabelecida</div>
        
        <h1>Sua conta foi qualificada para o bônus hoje.</h1>

        <div class="bonus-box">
            <span>BÔNUS ATUAL:</span>
            <span class="bonus-val">100% NO PIX</span>
            <small>Válido pelos próximos 15 minutos</small>
        </div>

        <a href="SEU_LINK_AQUI" class="cta-button" onclick="track()">
            ENTRAR NA PLATAFORMA
        </a>

        <div class="footer">
            Proibido para menores de 18 anos.<br>
            Aposte com responsabilidade.
        </div>
    </div>

    <script>
        function track() {
            // O comando do seu pixel vai aqui para contar a conversão do clique
            console.log("Lead clicou - Redirecionando...");
        }
    </script>

</body>
</html>
